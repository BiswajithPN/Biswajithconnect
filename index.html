<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISWAJITH CONNECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0F172A;
            --surface: rgba(255, 255, 255, 0.05);
            --surface2: rgba(255, 255, 255, 0.08);
            --primary: #4F46E5;
            --accent: #22D3EE;
            --text: #F1F5F9;
            --text2: #94A3B8;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --msg-out: #4F46E5;
            --msg-in: rgba(255, 255, 255, 0.08);
        }

        [data-theme="light"] {
            --bg: #F1F5F9;
            --surface: rgba(255, 255, 255, 0.9);
            --surface2: rgba(255, 255, 255, 0.7);
            --primary: #4F46E5;
            --accent: #0891B2;
            --text: #0F172A;
            --text2: #475569;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --msg-out: #4F46E5;
            --msg-in: rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: all .3s
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border)
        }

        /* AUTH */
        #authScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100
        }

        #authScreen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(34, 211, 238, 0.1) 0%, transparent 50%)
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            position: relative;
            z-index: 1
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px
        }

        .auth-logo .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4)
        }

        .auth-logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .auth-logo p {
            color: var(--text2);
            font-size: 14px;
            margin-top: 4px
        }

        .form-group {
            margin-bottom: 16px
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 8px
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: all .2s;
            outline: none
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15)
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), #6366F1);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4)
        }

        .btn:active {
            transform: translateY(0)
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .btn-ghost:hover {
            background: var(--surface2);
            box-shadow: none
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text2)
        }

        .auth-switch a {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500
        }

        .auth-switch a:hover {
            text-decoration: underline
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text2);
            font-size: 13px
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #F87171;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
            max-width: 320px
        }

        .toast.show {
            transform: translateX(0)
        }

        .toast.success {
            background: #10B981;
            color: #fff
        }

        .toast.error {
            background: #EF4444;
            color: #fff
        }

        .toast.info {
            background: var(--primary);
            color: #fff
        }

        /* MAIN APP */
        #app {
            display: none;
            height: 100vh;
            flex-direction: row
        }

        #app.visible {
            display: flex
        }

        /* SIDEBAR */
        .sidebar {
            width: 320px;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--surface);
            height: 100vh
        }

        .sidebar-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border)
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 16px
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            flex: 1
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            font-size: 15px
        }

        .icon-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary)
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border)
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: all .2s
        }

        .search-box input:focus {
            border-color: var(--primary)
        }

        .search-wrap {
            position: relative
        }

        .search-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text2);
            font-size: 13px
        }

        .sidebar-tabs {
            display: flex;
            padding: 8px 16px;
            gap: 4px;
            border-bottom: 1px solid var(--border)
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all .2s;
            position: relative
        }

        .chat-item:hover {
            background: var(--surface2)
        }

        .chat-item.active {
            background: rgba(79, 70, 229, 0.15);
            border: 1px solid rgba(79, 70, 229, 0.2)
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 18px
        }

        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg);
            background: #6B7280
        }

        .status-dot.online {
            background: #10B981
        }

        .chat-info {
            flex: 1;
            min-width: 0
        }

        .chat-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 3px
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px
        }

        .chat-time {
            font-size: 11px;
            color: var(--text2)
        }

        .badge {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center
        }

        /* MAIN CHAT */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
            position: relative
        }

        .no-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: var(--text2)
        }

        .no-chat .big-icon {
            font-size: 80px;
            opacity: .3
        }

        .no-chat h3 {
            font-size: 22px;
            color: var(--text)
        }

        .no-chat p {
            font-size: 14px
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(20px)
        }

        .chat-header-info {
            flex: 1
        }

        .chat-header-name {
            font-size: 16px;
            font-weight: 600
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text2)
        }

        .chat-header-status.online {
            color: #10B981
        }

        .header-actions {
            display: flex;
            gap: 8px
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .messages-area::-webkit-scrollbar {
            width: 4px
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px
        }

        .msg-bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: msgIn .2s ease;
            word-break: break-word;
            position: relative
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-out {
            background: var(--msg-out);
            color: #fff;
            border-radius: 16px 16px 4px 16px;
            align-self: flex-end
        }

        .msg-in {
            background: var(--msg-in);
            color: var(--text);
            border-radius: 16px 16px 16px 4px;
            align-self: flex-start
        }

        .msg-time {
            font-size: 10px;
            opacity: .7;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .msg-out .msg-time {
            justify-content: flex-end;
            color: rgba(255, 255, 255, 0.7)
        }

        .msg-status {
            font-size: 12px
        }

        .msg-status.read {
            color: #22D3EE
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--msg-in);
            border-radius: 16px;
            width: 80px;
            align-self: flex-start
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text2);
            border-radius: 50%;
            animation: typing 1.2s infinite
        }

        .typing-dot:nth-child(2) {
            animation-delay: .2s
        }

        .typing-dot:nth-child(3) {
            animation-delay: .4s
        }

        @keyframes typing {

            0%,
            80%,
            100% {
                transform: scale(1);
                opacity: .5
            }

            40% {
                transform: scale(1.2);
                opacity: 1
            }
        }

        .msg-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .msg-input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 16px;
            gap: 10px;
            transition: border-color .2s
        }

        .msg-input-wrap:focus-within {
            border-color: var(--primary)
        }

        .msg-input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            font-family: inherit
        }

        .msg-input-wrap input::placeholder {
            color: var(--text2)
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #6366F1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.5)
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            position: relative;
            animation: modalIn .3s cubic-bezier(.34, 1.56, .64, 1)
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.9)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #F87171;
            border-color: rgba(239, 68, 68, 0.3)
        }

        /* CALL SCREEN */
        #callScreen {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            background: linear-gradient(135deg, #0F172A, #1E1B4B, #0F172A);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px
        }

        #callScreen.open {
            display: flex
        }

        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
            position: relative;
            box-shadow: 0 0 0 20px rgba(79, 70, 229, 0.1), 0 0 0 40px rgba(79, 70, 229, 0.05)
        }

        .call-avatar::before {
            content: '';
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            border: 2px solid rgba(79, 70, 229, 0.3);
            animation: pulse 2s infinite
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1
            }

            100% {
                transform: scale(1.4);
                opacity: 0
            }
        }

        .call-name {
            font-size: 28px;
            font-weight: 700;
            color: #fff
        }

        .call-status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px
        }

        .call-timer {
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
            display: none
        }

        .call-controls {
            display: flex;
            gap: 20px;
            margin-top: 16px
        }

        .call-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff
        }

        .call-btn:hover {
            transform: scale(1.1)
        }

        .call-btn.mute {
            background: rgba(255, 255, 255, 0.2)
        }

        .call-btn.end {
            background: #EF4444;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4)
        }

        .call-btn.accept {
            background: #10B981;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4)
        }

        .call-btn.speaker {
            background: rgba(255, 255, 255, 0.2)
        }

        /* INCOMING CALL */
        #incomingCall {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            z-index: 250;
            display: none;
            backdrop-filter: blur(20px);
            animation: slideUp .3s ease;
            min-width: 280px
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        #incomingCall.open {
            display: block
        }

        .incoming-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px
        }

        .incoming-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 20px
        }

        .incoming-text h4 {
            font-size: 16px;
            font-weight: 600
        }

        .incoming-text p {
            font-size: 13px;
            color: var(--text2)
        }

        .incoming-actions {
            display: flex;
            gap: 12px
        }

        .incoming-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit
        }

        .incoming-actions .accept {
            background: #10B981;
            color: #fff
        }

        .incoming-actions .reject {
            background: #EF4444;
            color: #fff
        }

        .incoming-actions button:hover {
            transform: scale(1.02)
        }

        /* PROFILE MODAL */
        .profile-pic-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            cursor: pointer
        }

        .profile-pic-wrap .avatar-lg {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 32px;
            font-weight: 600
        }

        .profile-pic-wrap .edit-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .2s;
            color: #fff;
            font-size: 18px
        }

        .profile-pic-wrap:hover .edit-overlay {
            opacity: 1
        }

        /* EMOJI PICKER */
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            z-index: 50;
            backdrop-filter: blur(20px)
        }

        .emoji-picker.open {
            display: grid
        }

        .emoji-picker span {
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: background .15s;
            text-align: center
        }

        .emoji-picker span:hover {
            background: var(--surface2)
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform .3s
            }

            .sidebar.open {
                transform: translateX(0)
            }

            .main-chat {
                width: 100%
            }

            .mobile-menu-btn {
                display: flex !important
            }
        }

        .mobile-menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            font-size: 15px;
            margin-right: 4px
        }

        .overlay-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 49
        }

        .overlay-backdrop.open {
            display: block
        }
    </style>
</head>

<body>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- AUTH SCREEN -->
    <div id="authScreen">
        <div class="auth-card glass">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <h1>BISWAJITH CONNECT</h1>
                <p>Professional Real-Time Messaging</p>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <!-- LOGIN -->
            <div id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail"
                        placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPass"
                        placeholder="••••••••"></div>
                <button class="btn" onclick="login()">Sign In</button>
                <div class="divider">or</div>
                <button class="btn btn-ghost" onclick="loginGuest()"><i class="fas fa-user-secret"
                        style="margin-right:8px"></i>Continue as Guest</button>
                <p class="auth-switch">No account? <a onclick="showSignup()">Create one</a></p>
            </div>
            <!-- SIGNUP -->
            <div id="signupForm" style="display:none">
                <button onclick="showLogin()"
                    style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:0;font-family:inherit"><i
                        class="fas fa-arrow-left"></i> Back to Sign In</button>
                <div class="form-group"><label>Full Name</label><input type="text" id="signupName"
                        placeholder="Your Name"></div>
                <div class="form-group"><label>Email</label><input type="email" id="signupEmail"
                        placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="signupPass"
                        placeholder="Min 6 characters"></div>
                <button class="btn" onclick="signup()">Create Account</button>
                <p class="auth-switch">Have an account? <a onclick="showLogin()">Sign in</a></p>
            </div>
        </div>
    </div>
    </div>

    <!-- MOBILE BACKDROP -->
    <div class="overlay-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

    <!-- MAIN APP -->
    <div id="app">
        <!-- SIDEBAR -->
        <div class="sidebar glass" id="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar" id="myAvatar" onclick="openProfile()"></div>
                <h2 style="flex:1">Chats</h2>
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-moon"
                        id="themeIcon"></i></button>
                <button class="icon-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="search-box">
                <div class="search-wrap">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users or chats..."
                        oninput="handleSearch(this.value)">
                </div>
            </div>
            <div class="sidebar-tabs">
                <button class="tab-btn active" onclick="switchTab('chats',this)">Chats</button>
                <button class="tab-btn" onclick="switchTab('users',this)">People</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- MAIN -->
        <div class="main-chat" id="mainChat">
            <div class="no-chat" id="noChat">
                <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="openSidebar()"><i
                        class="fas fa-bars"></i></button>
                <div class="big-icon">💬</div>
                <h3>BISWAJITH CONNECT</h3>
                <p>Select a conversation to start chatting</p>
            </div>
            <!-- CHAT WINDOW (hidden until chat selected) -->
            <div id="chatWindow" style="display:none;flex-direction:column;height:100%">
                <div class="chat-header glass">
                    <button class="mobile-menu-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
                    <div class="chat-avatar" id="chatHeaderAvatar"
                        style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px">
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chatHeaderName"></div>
                        <div class="chat-header-status" id="chatHeaderStatus">offline</div>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" onclick="startCall('voice')" title="Voice Call"><i
                                class="fas fa-phone"></i></button>
                        <button class="icon-btn" onclick="startCall('video')" title="Video Call"><i
                                class="fas fa-video"></i></button>
                        <button class="icon-btn" onclick="openSearch()" title="Search"><i
                                class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="msg-input-area" style="position:relative">
                    <div class="emoji-picker" id="emojiPicker"></div>
                    <div class="msg-input-wrap">
                        <button class="icon-btn"
                            style="background:transparent;border:none;width:24px;height:24px;font-size:18px;cursor:pointer;color:var(--text2)"
                            onclick="toggleEmoji()" title="Emoji">😊</button>
                        <input type="text" id="msgInput" placeholder="Type a message..."
                            onkeydown="handleKeyDown(event)" oninput="handleTyping()">
                        <button class="icon-btn"
                            style="background:transparent;border:none;width:24px;height:24px;font-size:16px;cursor:pointer;color:var(--text2)"
                            onclick="document.getElementById('fileInput').click()" title="Attach"><i
                                class="fas fa-paperclip"></i></button>
                        <input type="file" id="fileInput" style="display:none" onchange="handleFile(this)">
                    </div>
                    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- PROFILE MODAL -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal glass">
            <button class="modal-close" onclick="closeModal('profileModal')"><i class="fas fa-times"></i></button>
            <h3 style="margin-bottom:20px;font-size:20px">My Profile</h3>
            <div class="profile-pic-wrap" onclick="document.getElementById('avatarInput').click()">
                <div class="avatar-lg" id="profileAvatar"></div>
                <div class="edit-overlay"><i class="fas fa-camera"></i></div>
                <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="updateAvatar(this)">
            </div>
            <div class="form-group"><label>Full Name</label><input type="text" id="profileName" placeholder="Your name">
            </div>
            <div class="form-group"><label>Email</label><input type="email" id="profileEmail" disabled
                    style="opacity:.6"></div>
            <button class="btn" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>

    <!-- CALL SCREEN -->
    <div class="call-screen" id="callScreen">
        <div class="call-avatar" id="callAvatar"></div>
        <div class="call-name" id="callName"></div>
        <div class="call-status" id="callStatus">Calling...</div>
        <div class="call-timer" id="callTimer">00:00</div>
        <div class="call-controls">
            <button class="call-btn mute" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone"
                    id="muteIcon"></i></button>
            <button class="call-btn end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            <button class="call-btn speaker" onclick="toggleSpeaker()"><i class="fas fa-volume-up"
                    id="speakerIcon"></i></button>
        </div>
    </div>

    <!-- INCOMING CALL -->
    <div id="incomingCall">
        <div class="incoming-info">
            <div class="incoming-avatar" id="incomingAvatar"></div>
            <div class="incoming-text">
                <h4 id="incomingName">Caller</h4>
                <p>Incoming voice call...</p>
            </div>
        </div>
        <div class="incoming-actions">
            <button class="accept" onclick="acceptCall()"><i class="fas fa-phone"></i> Accept</button>
            <button class="reject" onclick="rejectCall()"><i class="fas fa-phone-slash"></i> Reject</button>
        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        // ── Firebase init ────────────────────────────────────────────
        const firebaseConfig = { apiKey: "AIzaSyAbWcLigY6Ul1KrEIroaF4yItMRiZxAl6M", authDomain: "biswajith-connect.firebaseapp.com", projectId: "biswajith-connect", storageBucket: "biswajith-connect.firebasestorage.app", messagingSenderId: "949812641338", appId: "1:949812641338:web:bd6b58ad636b70d7313f03" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ── LocalStorage fallback (used when Firebase Auth not enabled) ───
        const LS_USERS = 'bc_users', LS_SESSION = 'bc_session', LS_MSGS = 'bc_msgs';
        let useLocalMode = false;

        function lsGetUsers() { try { return JSON.parse(localStorage.getItem(LS_USERS) || '{}') } catch { return {} } }
        function lsSaveUsers(u) { localStorage.setItem(LS_USERS, JSON.stringify(u)) }
        function lsGetSession() { try { return JSON.parse(localStorage.getItem(LS_SESSION) || 'null') } catch { return null } }
        function lsSaveSession(u) { localStorage.setItem(LS_SESSION, JSON.stringify(u)) }
        function lsClearSession() { localStorage.removeItem(LS_SESSION) }
        function lsGetMsgs(chatId) { try { return JSON.parse(localStorage.getItem(LS_MSGS + '_' + chatId) || '[]') } catch { return [] } }
        function lsSaveMsgs(chatId, msgs) { localStorage.setItem(LS_MSGS + '_' + chatId, JSON.stringify(msgs)) }

        function lsOnUsersChange(cb) { cb(lsGetUsers()); window.addEventListener('storage', () => cb(lsGetUsers())) }

        function showModeBanner(local) {
            let b = document.getElementById('modeBanner');
            if (!b) {
                b = document.createElement('div'); b.id = 'modeBanner'; b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#D97706;color:#fff;text-align:center;font-size:12px;padding:6px;z-index:9999;font-family:Inter,sans-serif';
                document.body.prepend(b);
            }
            b.innerHTML = local ? '⚠️ Running in <b>offline/local mode</b> — Enable Firebase Auth for real-time multi-device sync. &nbsp;<a href="https://console.firebase.google.com" target="_blank" style="color:#fff;text-decoration:underline">Fix in Firebase Console</a>' : '';
            b.style.display = local ? 'block' : 'none';
        }

        // STATE
        let currentUser = null, currentChatId = null, currentChatUser = null, msgListener = null, typingTimer = null, callTimer = null, callSec = 0, isMuted = false, allUsers = [], myData = {};
        const emojis = ['😀', '😂', '😍', '🥰', '😎', '🤔', '😢', '😡', '👍', '👎', '❤️', '🔥', '🎉', '✨', '💯', '🙏', '😊', '🤣', '😭', '😱', '💪', '🎯', '🚀', '💡', '🌟', '😏', '🥳', '😴'];

        // ── AUTH UI helpers ───────────────────────────────────────────
        function showLogin() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('signupForm').style.display = 'none'; clearError() }
        function showSignup() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('signupForm').style.display = 'block'; clearError() }
        function showError(m) { const e = document.getElementById('errorMsg'); e.textContent = m; e.style.display = 'block' }
        function clearError() { document.getElementById('errorMsg').style.display = 'none' }

        function friendlyError(code) {
            const map = {
                'auth/configuration-not-found': 'Email/Password not enabled in Firebase. Switching to local mode…',
                'auth/operation-not-allowed': 'Email/Password not enabled in Firebase. Switching to local mode…',
                'auth/admin-restricted-operation': 'Anonymous auth not enabled in Firebase. Switching to local mode…',
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password.',
                'auth/invalid-credential': 'Incorrect email or password.',
                'auth/email-already-in-use': 'Email already registered. Sign in instead.',
                'auth/weak-password': 'Password must be 6+ characters.',
                'auth/invalid-email': 'Invalid email address.',
                'auth/too-many-requests': 'Too many attempts. Wait a moment.',
                'auth/network-request-failed': 'Network error. Check connection.',
            };
            return map[code] || 'Error: ' + code;
        }

        // ── Firebase login → falls back to localStorage ───────────────
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) return showError('Please fill all fields');
            clearError();
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                const LOCAL_CODES = ['auth/configuration-not-found', 'auth/operation-not-allowed', 'auth/network-request-failed'];
                if (LOCAL_CODES.includes(e.code)) {
                    // fallback to localStorage auth
                    const users = lsGetUsers();
                    const found = Object.values(users).find(u => u.email === email && u.password === pass);
                    if (!found) return showError('No local account found. Sign up first.');
                    useLocalMode = true;
                    lsSaveSession(found);
                    showModeBanner(true);
                    onLocalLogin(found);
                } else {
                    showError(friendlyError(e.code));
                }
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPass').value;
            if (!name || !email || !pass) return showError('Please fill all fields');
            if (pass.length < 6) return showError('Password must be 6+ characters');
            clearError();
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(cred.user.uid).set({ name, email, profilePic: '', status: 'online', lastSeen: firebase.firestore.FieldValue.serverTimestamp(), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                await cred.user.updateProfile({ displayName: name });
            } catch (e) {
                const LOCAL_CODES = ['auth/configuration-not-found', 'auth/operation-not-allowed', 'auth/network-request-failed'];
                if (LOCAL_CODES.includes(e.code)) {
                    // fallback: store in localStorage
                    const users = lsGetUsers();
                    if (Object.values(users).find(u => u.email === email)) return showError('Email already registered.');
                    const uid = 'local_' + Date.now();
                    const newUser = { uid, name, email, password: pass, profilePic: '', status: 'online', lastSeen: Date.now(), createdAt: Date.now() };
                    users[uid] = newUser;
                    lsSaveUsers(users);
                    lsSaveSession(newUser);
                    useLocalMode = true;
                    showModeBanner(true);
                    onLocalLogin(newUser);
                } else {
                    showError(friendlyError(e.code));
                }
            }
        }

        async function loginGuest() {
            clearError();
            // Always try Firebase first, then local
            try {
                const cred = await auth.signInAnonymously();
                const gn = 'Guest_' + Math.random().toString(36).substr(2, 5);
                await db.collection('users').doc(cred.user.uid).set({ name: gn, email: 'guest@connect.app', profilePic: '', status: 'online', lastSeen: firebase.firestore.FieldValue.serverTimestamp(), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            } catch (e) {
                // Any failure → local guest
                const gn = 'Guest_' + Math.random().toString(36).substr(2, 5);
                const uid = 'guest_' + Date.now();
                const guestUser = { uid, name: gn, email: 'guest@connect.app', password: '', profilePic: '', status: 'online', lastSeen: Date.now(), createdAt: Date.now(), isGuest: true };
                const users = lsGetUsers();
                users[uid] = guestUser;
                lsSaveUsers(users);
                lsSaveSession(guestUser);
                useLocalMode = true;
                showModeBanner(true);
                onLocalLogin(guestUser);
            }
        }

        // ── Local-mode login handler ──────────────────────────────────
        function onLocalLogin(userData) {
            currentUser = { uid: userData.uid };
            myData = userData;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').classList.add('visible');
            initUI();
            loadUsersLocal();
            requestNotifPermission();
            setupEmojiPicker();
        }

        function loadUsersLocal() {
            const refresh = () => {
                const users = lsGetUsers();
                allUsers = Object.values(users).filter(u => u.uid !== currentUser.uid);
                renderList(allUsers, 'chats');
            };
            refresh();
            setInterval(refresh, 3000);
        }

        async function logout() {
            if (useLocalMode) {
                // update local status
                if (currentUser) {
                    const users = lsGetUsers();
                    if (users[currentUser.uid]) { users[currentUser.uid].status = 'offline'; lsSaveUsers(users); }
                }
                lsClearSession();
                useLocalMode = false;
                location.reload();
                return;
            }
            if (currentUser) {
                try { await db.collection('users').doc(currentUser.uid).update({ status: 'offline', lastSeen: firebase.firestore.FieldValue.serverTimestamp() }); } catch (e) { }
            }
            await auth.signOut();
        }

        // ── Firebase auth state listener ──────────────────────────────
        auth.onAuthStateChanged(async user => {
            if (user) {
                useLocalMode = false;
                showModeBanner(false);
                currentUser = user;
                const snap = await db.collection('users').doc(user.uid).get();
                if (snap.exists) myData = snap.data();
                else { myData = { name: user.displayName || 'User', email: user.email || '', profilePic: '', status: 'online' } }
                try { await db.collection('users').doc(user.uid).update({ status: 'online', lastSeen: firebase.firestore.FieldValue.serverTimestamp() }); } catch (e) { }
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').classList.add('visible');
                initUI();
                loadUsers();
                requestNotifPermission();
                setupEmojiPicker();
            } else {
                // Check for local session
                const localSession = lsGetSession();
                if (localSession) {
                    useLocalMode = true;
                    showModeBanner(true);
                    onLocalLogin(localSession);
                } else {
                    currentUser = null;
                    document.getElementById('authScreen').style.display = 'flex';
                    document.getElementById('app').classList.remove('visible');
                }
            }
        });
        function initUI() {
            setAvatar('myAvatar', myData.name, myData.profilePic);
            document.getElementById('profileName').value = myData.name || '';
            document.getElementById('profileEmail').value = myData.email || currentUser?.email || '';
            setAvatar('profileAvatar', myData.name, myData.profilePic, 32);
        }

        function setAvatar(id, name, pic, fs = 18) {
            const el = document.getElementById(id);
            if (!el) return;
            if (pic) { el.innerHTML = `<img src="${pic}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`; return }
            el.textContent = (name || 'U')[0].toUpperCase();
            el.style.fontSize = fs + 'px';
        }

        async function loadUsers() {
            db.collection('users').onSnapshot(snap => {
                allUsers = [];
                snap.forEach(doc => { if (doc.id !== currentUser.uid) allUsers.push({ id: doc.id, ...doc.data() }) });
                renderList(allUsers, 'chats');
            });
        }

        let currentTab = 'chats';
        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList(allUsers, tab);
        }

        function renderList(users, tab) {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            if (!users.length) { list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text2);font-size:14px">No users found</div>`; return }
            users.forEach(u => list.appendChild(createUserItem(u)));
        }

        function createUserItem(u) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            const initial = (u.name || 'U')[0].toUpperCase();
            div.innerHTML = `
    <div class="chat-avatar" style="background:${randomGrad(u.id)}">
      ${u.profilePic ? `<img src="${u.profilePic}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : `<span style="font-size:20px;font-weight:600;color:#fff">${initial}</span>`}
      <span class="status-dot ${u.status === 'online' ? 'online' : ''}"></span>
    </div>
    <div class="chat-info">
      <div class="chat-name">${sanitize(u.name || 'User')}</div>
      <div class="chat-preview">${u.status === 'online' ? '<span style="color:#10B981">●</span> Online' : 'Last seen ' + timeAgo(u.lastSeen?.toDate?.())}</div>
    </div>`;
            div.onclick = () => openChat(u);
            return div;
        }

        function randomGrad(id) { const colors = [['#4F46E5', '#7C3AED'], ['#0891B2', '#0E7490'], ['#059669', '#047857'], ['#D97706', '#B45309'], ['#DC2626', '#B91C1C'], ['#7C3AED', '#6D28D9']]; const i = id.charCodeAt(0) % colors.length; return `linear-gradient(135deg,${colors[i][0]},${colors[i][1]})` }

        function handleSearch(q) {
            const filtered = allUsers.filter(u => (u.name || '').toLowerCase().includes(q.toLowerCase()) || (u.email || '').toLowerCase().includes(q.toLowerCase()));
            renderList(filtered, currentTab);
        }

        async function openChat(user) {
            currentChatUser = user;
            const uid2 = user.id || user.uid;
            const ids = [currentUser.uid, uid2].sort();
            currentChatId = ids.join('_');
            document.getElementById('noChat').style.display = 'none';
            const cw = document.getElementById('chatWindow');
            cw.style.display = 'flex';
            document.getElementById('chatHeaderName').textContent = user.name || 'User';
            const statusEl = document.getElementById('chatHeaderStatus');
            const lastSeenDate = user.lastSeen?.toDate ? user.lastSeen.toDate() : (user.lastSeen ? new Date(user.lastSeen) : null);
            statusEl.textContent = user.status === 'online' ? 'Online' : 'Last seen ' + timeAgo(lastSeenDate);
            statusEl.className = 'chat-header-status' + (user.status === 'online' ? ' online' : '');
            const av = document.getElementById('chatHeaderAvatar');
            if (user.profilePic) av.innerHTML = `<img src="${user.profilePic}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`;
            else av.textContent = (user.name || 'U')[0].toUpperCase();
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
            event?.currentTarget?.classList.add('active');
            closeSidebar();
            stopLocalPoll();
            listenMessages();
            if (useLocalMode) startLocalPoll();
        }

        function listenMessages() {
            if (useLocalMode) { renderLocalMessages(); return; }
            if (msgListener) msgListener();
            const msgsRef = db.collection('chats').doc(currentChatId).collection('messages').orderBy('timestamp');
            msgListener = msgsRef.onSnapshot(snap => {
                const area = document.getElementById('messagesArea');
                area.innerHTML = '';
                snap.docs.forEach(doc => {
                    const m = { id: doc.id, ...doc.data() };
                    area.appendChild(createMsgBubble(m));
                    if (m.senderId !== currentUser.uid && m.status !== 'read') {
                        db.collection('chats').doc(currentChatId).collection('messages').doc(doc.id).update({ status: 'read' }).catch(() => { });
                    }
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        function renderLocalMessages() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            const msgs = lsGetMsgs(currentChatId);
            msgs.forEach(m => area.appendChild(createMsgBubble(m)));
            area.scrollTop = area.scrollHeight;
        }

        // Poll local messages every 1s
        let localMsgPoll = null;
        function startLocalPoll() { stopLocalPoll(); if (useLocalMode) localMsgPoll = setInterval(renderLocalMessages, 1000); }
        function stopLocalPoll() { if (localMsgPoll) clearInterval(localMsgPoll); }

        function createMsgBubble(m) {
            const isMe = m.senderId === currentUser.uid;
            const wrap = document.createElement('div');
            wrap.style.display = 'flex';
            wrap.style.flexDirection = 'column';
            wrap.style.alignItems = isMe ? 'flex-end' : 'flex-start';
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble ' + (isMe ? 'msg-out' : 'msg-in');
            let content = `<div>${sanitize(m.text || '')}</div>`;
            if (m.type === 'image' && m.imageUrl) content = `<img src="${m.imageUrl}" style="max-width:200px;border-radius:8px;display:block" onclick="window.open('${m.imageUrl}')">`;
            const t = new Date(m.timestamp || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const statusIcon = isMe ? `<span class="msg-status ${m.status === 'read' ? 'read' : ''}">${m.status === 'read' ? '✓✓' : m.status === 'delivered' ? '✓✓' : '✓'}</span>` : '';
            bubble.innerHTML = content + `<div class="msg-time">${t}${statusIcon}</div>`;
            bubble.ondblclick = () => deleteMsg(m.id);
            wrap.appendChild(bubble);
            return wrap;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            input.value = '';
            const msg = { senderId: currentUser.uid, receiverId: currentChatUser.id || currentChatUser.uid, text, timestamp: Date.now(), status: 'sent', type: 'text' };
            if (useLocalMode) {
                const msgs = lsGetMsgs(currentChatId);
                msg.id = 'msg_' + Date.now();
                msgs.push(msg);
                lsSaveMsgs(currentChatId, msgs);
                renderLocalMessages();
                playSound('send');
                return;
            }
            try {
                const ref = db.collection('chats').doc(currentChatId);
                await ref.set({ participants: [currentUser.uid, currentChatUser.id], lastMessage: text, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                await ref.collection('messages').add(msg);
                playSound('send');
            } catch (e) { showToast('Failed to send', 'error') }
        }

        async function deleteMsg(id) {
            if (!confirm('Delete this message?')) return;
            await db.collection('chats').doc(currentChatId).collection('messages').doc(id).delete();
        }

        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } }

        function handleTyping() {
            if (!currentChatId) return;
            db.collection('chats').doc(currentChatId).update({ [`typing_${currentUser.uid}`]: true }).catch(() => { });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => { db.collection('chats').doc(currentChatId).update({ [`typing_${currentUser.uid}`]: false }).catch(() => { }) }, 2000);
        }

        // EMOJI
        function setupEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            emojis.forEach(e => { const s = document.createElement('span'); s.textContent = e; s.onclick = () => { document.getElementById('msgInput').value += e; }; picker.appendChild(s) });
        }
        function toggleEmoji() { document.getElementById('emojiPicker').classList.toggle('open') }
        document.addEventListener('click', e => { if (!e.target.closest('#emojiPicker') && !e.target.closest('[onclick="toggleEmoji()"]')) document.getElementById('emojiPicker').classList.remove('open') });

        // FILE
        async function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const msg = { senderId: currentUser.uid, receiverId: currentChatUser.id, text: '', imageUrl: e.target.result, timestamp: Date.now(), status: 'sent', type: 'image' };
                const ref = db.collection('chats').doc(currentChatId);
                await ref.set({ participants: [currentUser.uid, currentChatUser.id], lastMessage: '📷 Image', lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                await ref.collection('messages').add(msg);
            };
            reader.readAsDataURL(file);
        }

        // CALL
        let callType = 'voice';
        function startCall(type) {
            if (!currentChatUser) return;
            callType = type;
            document.getElementById('callName').textContent = currentChatUser.name || 'User';
            document.getElementById('callStatus').textContent = type === 'video' ? 'Video calling...' : 'Calling...';
            document.getElementById('callAvatar').textContent = (currentChatUser.name || 'U')[0].toUpperCase();
            document.getElementById('callTimer').style.display = 'none';
            document.getElementById('callScreen').classList.add('open');
            playSound('ring');
            setTimeout(() => {
                document.getElementById('callStatus').textContent = 'Connected';
                document.getElementById('callTimer').style.display = 'block';
                startCallTimer();
            }, 3000);
        }
        function endCall() { document.getElementById('callScreen').classList.remove('open'); stopCallTimer(); stopSound() }
        function startCallTimer() { callSec = 0; callTimer = setInterval(() => { callSec++; const m = String(Math.floor(callSec / 60)).padStart(2, '0'); const s = String(callSec % 60).padStart(2, '0'); document.getElementById('callTimer').textContent = m + ':' + s }, 1000) }
        function stopCallTimer() { if (callTimer) clearInterval(callTimer) }
        function toggleMute() { isMuted = !isMuted; document.getElementById('muteIcon').className = isMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone'; document.getElementById('muteBtn').style.background = isMuted ? 'rgba(239,68,68,0.3)' : 'rgba(255,255,255,0.2)' }
        function toggleSpeaker() { const ic = document.getElementById('speakerIcon'); ic.className = ic.className.includes('slash') ? 'fas fa-volume-up' : 'fas fa-volume-mute' }

        function showIncomingCall(name) {
            document.getElementById('incomingName').textContent = name;
            document.getElementById('incomingAvatar').textContent = (name || 'U')[0].toUpperCase();
            document.getElementById('incomingCall').classList.add('open');
            playSound('ring');
        }
        function acceptCall() { document.getElementById('incomingCall').classList.remove('open'); startCall(callType) }
        function rejectCall() { document.getElementById('incomingCall').classList.remove('open'); stopSound() }

        // SOUND
        let audioCtx = null;
        function playSound(type) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if (type === 'send') { o.frequency.value = 800; g.gain.setValueAtTime(.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .15); o.start(); o.stop(audioCtx.currentTime + .15) }
                else if (type === 'ring') { o.frequency.value = 440; g.gain.setValueAtTime(.2, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 1) }
            } catch (e) { }
        }
        function stopSound() { if (audioCtx) audioCtx.close().catch(() => { }) }

        // PROFILE
        function openProfile() {
            document.getElementById('profileName').value = myData.name || '';
            document.getElementById('profileEmail').value = myData.email || '';
            setAvatar('profileAvatar', myData.name, myData.profilePic, 32);
            document.getElementById('profileModal').classList.add('open');
        }
        async function saveProfile() {
            const name = document.getElementById('profileName').value.trim();
            if (!name) return showToast('Name required', 'error');
            await db.collection('users').doc(currentUser.uid).update({ name });
            myData.name = name;
            setAvatar('myAvatar', name, myData.profilePic);
            closeModal('profileModal');
            showToast('Profile updated!', 'success');
        }
        function updateAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const url = e.target.result;
                await db.collection('users').doc(currentUser.uid).update({ profilePic: url });
                myData.profilePic = url;
                setAvatar('myAvatar', myData.name, url);
                setAvatar('profileAvatar', myData.name, url, 32);
                showToast('Avatar updated!', 'success');
            };
            reader.readAsDataURL(file);
        }

        // MODAL
        function closeModal(id) { document.getElementById(id).classList.remove('open') }

        // THEME
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // MOBILE
        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarBackdrop').classList.add('open') }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarBackdrop').classList.remove('open') }

        // NOTIFICATIONS
        function requestNotifPermission() { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission() }
        function showBrowserNotif(title, body) { if (Notification.permission === 'granted') { new Notification(title, { body, icon: '/favicon.ico' }) } }

        // TOAST
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${type}`;
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // UTILS
        function sanitize(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }
        function timeAgo(d) { if (!d) return 'recently'; const s = Math.floor((Date.now() - d) / 1000); if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; if (s < 86400) return Math.floor(s / 3600) + 'h ago'; return Math.floor(s / 86400) + 'd ago' }
        function openSearch() { showToast('Message search coming soon!', 'info') }

        // ONLINE PRESENCE
        window.addEventListener('beforeunload', () => { if (currentUser) db.collection('users').doc(currentUser.uid).update({ status: 'offline', lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => { }) });
    </script>
</body>

</html>
